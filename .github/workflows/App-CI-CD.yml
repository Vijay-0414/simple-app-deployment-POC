name: Mobile CI/CD

on:
  pull_request:
    branches:
      - develop
      - main

  push:
    branches:
      - develop

  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deploy Target"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - production
jobs:
  test:
    name: Lint, Test & Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Run Android Lint
        run: ./gradlew lint

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Build Debug APK
        run: ./gradlew assembleDebug
