name: Android Production Deployment

on:
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  android-production-deploy:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'develop'
    name: Android Production Deployment
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: gradle

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install Bundler
        run: gem install bundler

      - name: Install Fastlane Dependencies
        run: bundle install

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Decode Android Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/aptster-upload-key.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> key.properties
          echo "storeFile=aptster-upload-key.jks" >> key.properties

#      - name: Create Google Play Service Account JSON
#        run: |
#          echo '${{ secrets.PLAY_STORE_JSON }}' > google-play.json

      - name: Deploy to Google Play Production
        run: bundle exec fastlane android android_production

      - name: Upload Production AAB
        uses: actions/upload-artifact@v4
        with:
          name: production-aab
          path: app/build/outputs/bundle/release/*.aab
